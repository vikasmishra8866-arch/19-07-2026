<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pawan Auto - Register</title>
    <!-- Tailwind CSS & FontAwesome Icons -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.6s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center overflow-hidden relative">

    <!-- Background Premium Glow Effect -->
    <div class="absolute w-96 h-96 bg-purple-600/20 rounded-full blur-3xl -top-20 -left-20"></div>
    <div class="absolute w-96 h-96 bg-blue-600/20 rounded-full blur-3xl -bottom-20 -right-20"></div>

    <!-- Register Container Box -->
    <div class="w-full max-w-md p-8 mx-4 bg-slate-900/60 backdrop-blur-xl border border-slate-800 rounded-2xl shadow-2xl animate-fade-in z-10">
        
        <!-- Header -->
        <div class="text-center mb-6">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-tr from-purple-600 to-blue-600 rounded-xl shadow-lg shadow-purple-500/20 mb-3">
                <i class="fa-solid fa-user-plus text-2xl text-white"></i>
            </div>
            <h2 class="text-3xl font-extrabold bg-gradient-to-r from-purple-400 to-blue-400 bg-clip-text text-transparent">Create Account</h2>
            <p class="text-slate-400 text-sm mt-1">Join Pawan Auto Premium Portal</p>
        </div>

        <!-- Flash Messages (Validation Errors) -->
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                <div class="mb-4 p-3 bg-red-500/10 border border-red-500/30 text-red-400 text-sm rounded-lg flex items-center gap-2">
                    <i class="fa-solid fa-circle-exclamation"></i> {{ message }}
                </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- Registration Form -->
        <form action="/register" method="POST" class="space-y-4">
            <!-- Mobile Number -->
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">Mobile Number</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
                        <i class="fa-solid fa-phone"></i>
                    </span>
                    <input type="tel" name="mobile" required placeholder="Enter mobile number" 
                           class="w-full pl-10 pr-4 py-2.5 bg-slate-950/50 border border-slate-800 rounded-xl focus:outline-none focus:border-purple-500 text-slate-200 placeholder-slate-600 transition-all duration-300">
                </div>
            </div>

            <!-- Password -->
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" name="password" required placeholder="Create password" 
                           class="w-full pl-10 pr-4 py-2.5 bg-slate-950/50 border border-slate-800 rounded-xl focus:outline-none focus:border-purple-500 text-slate-200 placeholder-slate-600 transition-all duration-300">
                </div>
            </div>

            <!-- Confirm Password -->
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">Confirm Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
                        <i class="fa-solid fa-lock-open"></i>
                    </span>
                    <input type="password" name="confirm_password" required placeholder="Confirm password" 
                           class="w-full pl-10 pr-4 py-2.5 bg-slate-950/50 border border-slate-800 rounded-xl focus:outline-none focus:border-purple-500 text-slate-200 placeholder-slate-600 transition-all duration-300">
                </div>
            </div>

            <!-- Secret Key Validation Box -->
            <div>
                <label class="block text-sm font-medium text-amber-400 mb-1 flex items-center gap-1">
                    <i class="fa-solid fa-key text-xs"></i> Secret Registration Key
                </label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-amber-500/50">
                        <i class="fa-solid fa-user-shield"></i>
                    </span>
                    <input type="password" name="secret_key" required placeholder="Enter 4-digit key" 
                           class="w-full pl-10 pr-4 py-2.5 bg-slate-950/50 border border-amber-500/30 rounded-xl focus:outline-none focus:border-amber-500 text-amber-200 placeholder-slate-700 transition-all duration-300">
                </div>
            </div>

            <!-- Register Button -->
            <button type="submit" 
                    class="w-full py-3 mt-3 bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-500 hover:to-blue-500 text-white font-semibold rounded-xl shadow-lg shadow-purple-500/20 transform hover:-translate-y-0.5 active:translate-y-0 transition-all duration-300 cursor-pointer">
                Register Account <i class="fa-solid fa-circle-check ml-2"></i>
            </button>
        </form>

        <!-- Back to Login with Sliding Effect -->
        <div class="mt-5 text-center">
            <p class="text-sm text-slate-400">
                Already have an id? 
                <a href="/login" class="text-purple-400 hover:text-purple-300 font-medium transition-colors duration-200 group">
                    <i class="fa-solid fa-arrow-left-long mr-1 text-xs transform group-hover:-translate-x-1 transition-transform"></i>
                    Sign In instead
                </a>
            </p>
        </div>

    </div>
</body>
</html>
